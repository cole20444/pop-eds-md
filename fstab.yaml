# Mount this same repo's /docs/ folder served via GitHub Pages.
# AEM Guides publishes DITA-OT HTML into /docs/; GitHub Pages auto-deploys
# /docs/ to the cole20444.github.io/pop-eds-md/ URL; aem.live fetches HTML
# from there and runs its standard html2md → content-bus pipeline.
mountpoints:
  /:
    url: https://cole20444.github.io/pop-eds-md/
    type: markup
