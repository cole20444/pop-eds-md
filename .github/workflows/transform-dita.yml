name: Transform DITA HTML

on:
  push:
    branches: [main]
    paths:
      - 'docs/**.htm'
      - 'scripts/transform-dita.mjs'
      - '.github/workflows/transform-dita.yml'

# Prevent concurrent runs from racing on the same files
concurrency:
  group: transform-dita-${{ github.ref }}
  cancel-in-progress: false

jobs:
  transform:
    runs-on: ubuntu-latest

    # Skip our own transform commits so we don't loop on ourselves
    if: "!contains(github.event.head_commit.message, '[skip-transform]')"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install transform deps
        run: npm install --no-save cheerio

      - name: Run transform
        run: node scripts/transform-dita.mjs

      - name: Commit transformed HTML
        run: |
          if [[ -z "$(git status --porcelain docs/)" ]]; then
            echo "No transform output changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "Clean DITA HTML for EDS rendering [skip-transform]"
          git push
