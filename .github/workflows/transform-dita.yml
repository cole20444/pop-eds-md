name: Transform DITA HTML

on:
  push:
    branches: [main]
    paths:
      - 'docs/**.htm'
      - 'scripts/transform-dita.mjs'
      - '.github/workflows/transform-dita.yml'

# Prevent concurrent runs from racing on the same files
concurrency:
  group: transform-dita-${{ github.ref }}
  cancel-in-progress: false

jobs:
  transform:
    runs-on: ubuntu-latest

    # GitHub doesn't re-trigger workflows from GITHUB_TOKEN-authored pushes,
    # so we don't need a skip token. Action's own commits won't loop.

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install transform deps
        run: npm install --no-save cheerio

      - name: Run transform
        run: node scripts/transform-dita.mjs

      - name: Commit transformed HTML
        run: |
          if [[ -z "$(git status --porcelain docs/)" ]]; then
            echo "No transform output changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # -A so deletions of the original .htm files are picked up too
          git add -A docs/
          git commit -m "Clean DITA HTML for EDS rendering"
          git push
